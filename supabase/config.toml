# Supabase local development configuration

[db]
port = 54330

[api]
port = 54333

[studio]
port = 54331

[inbucket]
port = 54332

# Paystack calls this webhook server-to-server, so it can't present a Supabase
# JWT. Disable the gateway's JWT check and verify the Paystack signature inside
# the function instead.
[functions.paystack-webhook]
verify_jwt = false
